services:
  - type: web
    name: swiftchat
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate && daphne -b 0.0.0.0 -p $PORT swiftchat.asgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: swiftchat-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: swiftchat-redis
          property: connectionString

  - type: redis
    name: swiftchat-redis
    plan: free
    ipAllowList: []

databases:
  - name: swiftchat-db
    plan: free
